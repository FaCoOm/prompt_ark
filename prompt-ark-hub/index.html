<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Ark Hub — Discover & Install AI Prompts</title>
    <meta name="description"
        content="Discover, install, and share high-quality AI prompts for ChatGPT, Gemini, Claude, and more. Community-driven prompt library.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="hub-container">
        <!-- Header -->
        <header class="hub-header">
            <div class="hub-logo">
                <h1>Prompt Ark Hub</h1>
            </div>
            <p class="hub-subtitle">Discover, install, and share AI prompts from the community</p>
        </header>

        <!-- Search -->
        <div class="hub-search">
            <span class="hub-search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search prompts by title, tag, or category...">
        </div>

        <!-- Controls: Categories + Sort -->
        <div class="hub-controls">
            <div class="hub-categories" id="categoryTabs">
                <button class="hub-cat-btn active" data-cat="all">All</button>
                <button class="hub-cat-btn" data-cat="Productivity">Productivity</button>
                <button class="hub-cat-btn" data-cat="Writing">Writing</button>
                <button class="hub-cat-btn" data-cat="Coding">Coding</button>
                <button class="hub-cat-btn" data-cat="Education">Education</button>
                <button class="hub-cat-btn" data-cat="Creative">Creative</button>
                <button class="hub-cat-btn" data-cat="Analysis">Analysis</button>
            </div>
            <div class="hub-sort">
                <span class="hub-sort-label">Sort by</span>
                <select id="sortSelect">
                    <option value="trending">🔥 Trending</option>
                    <option value="newest">🕐 Newest</option>
                    <option value="topRated">⭐ Top Rated</option>
                    <option value="quality">💎 Quality Score</option>
                </select>
            </div>
        </div>

        <!-- Stats -->
        <div class="hub-stats">
            <span class="hub-stats-count" id="statsCount"></span>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="hub-loading">
            <div class="spinner"></div>
            <p>Loading Hub index...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hub-empty" style="display: none;">
            <div class="hub-empty-icon">📭</div>
            <div class="hub-empty-title">No prompts yet</div>
            <p>Be the first to publish a prompt from Prompt Ark!</p>
        </div>

        <!-- Prompt Grid -->
        <div class="hub-grid" id="promptGrid"></div>

        <!-- Footer -->
        <footer class="hub-footer">
            <p>Prompt Ark Hub — Open source community prompt library</p>
            <p><a href="https://github.com/KeyonZeng/prompt_ark" target="_blank">GitHub</a> · Made with ❤️ by the Prompt
                Ark community</p>
        </footer>
    </div>

    <!-- Detail Modal -->
    <div class="hub-modal-backdrop" id="modalBackdrop">
        <div class="hub-modal" id="detailModal">
            <div class="hub-modal-header">
                <div>
                    <h2 class="hub-modal-title" id="modalTitle"></h2>
                </div>
                <button class="hub-modal-close" id="modalClose">✕</button>
            </div>
            <div class="hub-modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
            <div class="hub-modal-footer">
                <div class="hub-modal-votes">
                    <button class="hub-vote-btn up" id="voteUp">👍 <span id="voteUpCount">0</span></button>
                    <button class="hub-vote-btn down" id="voteDown">👎 <span id="voteDownCount">0</span></button>
                </div>
                <button class="hub-install-btn" id="installBtn">⚡ Add to Prompt Ark</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="hub-toast" id="toast"></div>

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="hub-app.js"></script>
</body>

</html>
